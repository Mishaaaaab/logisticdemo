<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Calculate cargo volume and volumetric weight on LogisticDemo." />
  <title>Cargo calculator — LogisticDemo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">LogisticDemo</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Registration</a>
      <a href="login.html">Login</a>
      <a href="tracking.html">Tracking</a>
      <a href="calculator.html">Calculator</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="form-card">
      <h1>Volume calculator</h1>
      <p class="muted">Enter cargo dimensions to calculate volume in m³ and volumetric weight.</p>
      <form id="volumeForm">
        <label>Length, m
          <input type="number" id="length" min="0.01" step="0.01" required />
        </label>
        <label>Width, m
          <input type="number" id="width" min="0.01" step="0.01" required />
        </label>
        <label>Height, m
          <input type="number" id="height" min="0.01" step="0.01" required />
        </label>
        <button class="btn primary full" type="submit">Calculate</button>
      </form>
      <p id="volumeResult" class="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
