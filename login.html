<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to your LogisticDemo account." />
  <title>Login — LogisticDemo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">LogisticDemo</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Registration</a>
      <a href="login.html">Login</a>
      <a href="tracking.html">Tracking</a>
      <a href="calculator.html">Calculator</a>
    </nav>
  </header>

  <main class="page-wrap">
    <section class="form-card">
      <h1>Login</h1>
      <form id="loginForm">
        <label>Email
          <input type="email" id="loginEmail" required />
        </label>
        <label>Password
          <input type="password" id="loginPassword" required />
        </label>
        <button class="btn primary full" type="submit">Log in</button>
        <p id="loginMessage" class="message"></p>
      </form>
      <p class="small-text">No account? <a href="register.html">Register</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
